<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0F1117"/>
  <!-- Background grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#1F2937" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1F2937" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#1F2937" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1F2937" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1F2937" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#1F2937" stroke-width="1"/>
  <!-- Candlesticks -->
  <rect x="120" y="280" width="60" height="160" rx="4" fill="#22C55E"/>
  <line x1="150" y1="240" x2="150" y2="280" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>
  <line x1="150" y1="440" x2="150" y2="490" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>

  <rect x="230" y="230" width="60" height="120" rx="4" fill="#EF4444"/>
  <line x1="260" y1="180" x2="260" y2="230" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="350" x2="260" y2="400" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>

  <rect x="340" y="200" width="60" height="150" rx="4" fill="#22C55E"/>
  <line x1="370" y1="160" x2="370" y2="200" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>
  <line x1="370" y1="350" x2="370" y2="400" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>

  <rect x="450" y="160" width="60" height="200" rx="4" fill="#22C55E"/>
  <line x1="480" y1="120" x2="480" y2="160" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>
  <line x1="480" y1="360" x2="480" y2="420" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>

  <rect x="560" y="180" width="60" height="120" rx="4" fill="#EF4444"/>
  <line x1="590" y1="140" x2="590" y2="180" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
  <line x1="590" y1="300" x2="590" y2="350" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>

  <!-- Text -->
  <text x="680" y="280" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="white">TradingBait</text>
  <text x="682" y="360" font-family="system-ui, sans-serif" font-size="32" fill="#9CA3AF">Your trading journal &amp; analytics platform</text>
</svg>
